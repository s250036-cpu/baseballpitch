<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 야구 투구폼 분석기 (정밀 시퀀스 단계 분석 탑재)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 비율 */
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
        }
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }
        .video-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <header class="bg-blue-900 text-white shadow-md py-6">
        <div class="max-w-6xl mx-auto px-4 flex items-center justify-between">
            <h1 class="text-2xl font-bold flex items-center gap-3">
                <i class="fa-solid fa-baseball-bat-ball text-yellow-400"></i>
                AI 야구 투구폼 분석기
            </h1>
            <span class="bg-blue-800 text-xs px-3 py-1.5 rounded-full border border-blue-700">시퀀스 타임 분석기</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2 text-slate-700">
                    <i class="fa-solid fa-square-play text-blue-600"></i> 투구 모니터링 영역
                </h2>
                
                <div class="video-wrapper shadow-inner">
                    <video id="input_video" playsinline controls muted></video>
                    <canvas id="output_canvas"></canvas>
                </div>

                <div class="mt-5 flex flex-wrap items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <label class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg cursor-pointer transition flex items-center gap-2 shadow-sm text-sm">
                            <i class="fa-solid fa-cloud-arrow-up"></i> 영상 업로드
                            <input type="file" id="upload-video" accept="video/*" class="hidden">
                        </label>
                        
                        <button id="btn-webcam" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-5 py-2.5 rounded-lg transition flex items-center gap-2 shadow-sm text-sm">
                            <i class="fa-solid fa-camera"></i> 웹캠 시작
                        </button>
                    </div>

                    <div class="text-sm font-medium text-slate-500">
                        상태: <span id="status-badge" class="px-2.5 py-1 rounded-full bg-slate-100 text-slate-600 text-xs font-semibold">대기 중</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="md:col-span-1">
            <div id="wait-card" class="bg-white p-8 rounded-xl shadow-sm border border-slate-100 text-center space-y-4 h-full flex flex-col justify-center items-center">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-2xl animate-pulse">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <div>
                    <h3 class="text-base font-semibold text-slate-700">종합 진단 대기 중</h3>
                    <p class="text-xs text-slate-400 mt-2 leading-relaxed">
                        영상이 완료되거나 웹캠을 정지하면, 동작 흐름(준비-코킹-릴리스-팔로스루)을 단계별로 추적한 다이내믹 AI 리포트가 이곳에 실시간으로 표시됩니다.
                    </p>
                </div>
            </div>

            <div id="report-card" class="hidden bg-white p-6 rounded-xl shadow-lg border-t-4 border-blue-600 space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                        <i class="fa-solid fa-square-poll-horizontal text-blue-600"></i> 역학 분석 리포트
                    </h3>
                    <button onclick="resetAnalysis()" class="text-xs text-slate-400 hover:text-red-500 transition">초기화</button>
                </div>

                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-xl text-center space-y-1 text-white shadow-sm">
                    <span class="text-xs font-bold text-blue-100 tracking-wider">PITCHING EFFICIENCY SCORE</span>
                    <div class="text-5xl font-black" id="final-score">0점</div>
                    <div class="text-[10px] text-blue-200 mt-1" id="analysis-summary-text">동작 흐름 평가 분석 완료</div>
                </div>

                <div class="space-y-2.5">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">핵심 궤적 데이터</span>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                            <div class="text-slate-400">코킹 팔꿈치 가동성</div>
                            <div class="text-sm font-bold text-slate-800 mt-0.5" id="rep-max-elbow">0°</div>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                            <div class="text-slate-400">디딤무릎 지탱력 (최저)</div>
                            <div class="text-sm font-bold text-slate-800 mt-0.5" id="rep-min-knee">0°</div>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                            <div class="text-slate-400">상·하체 비틀림(X-Factor)</div>
                            <div class="text-sm font-bold text-slate-800 mt-0.5" id="rep-hip-shoulder">0°</div>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                            <div class="text-slate-400">몸통 기울기 (상체 숙임)</div>
                            <div class="text-sm font-bold text-slate-800 mt-0.5" id="rep-torso-tilt">0°</div>
                        </div>
                    </div>
                </div>

                <div class="bg-amber-50/70 p-5 rounded-lg border border-amber-100 space-y-3">
                    <h4 class="text-xs font-bold text-amber-800 flex items-center gap-1.5 uppercase tracking-wide">
                        <i class="fa-solid fa-network-wired text-amber-600"></i> 투구 시퀀스 단계별 처방전
                    </h4>
                    <ul class="text-xs text-amber-900 leading-relaxed space-y-3" id="final-feedbacks">
                        </ul>
                </div>
            </div>
        </div>

    </main>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        const statusBadge = document.getElementById('status-badge');
        const waitCard = document.getElementById('wait-card');
        const reportCard = document.getElementById('report-card');
        const btnWebcam = document.getElementById('btn-webcam');

        const finalScoreText = document.getElementById('final-score');
        const repMaxElbowText = document.getElementById('rep-max-elbow');
        const repMinKneeText = document.getElementById('rep-min-knee');
        const repHipShoulderText = document.getElementById('rep-hip-shoulder');
        const repTorsoTiltText = document.getElementById('rep-torso-tilt');
        const finalFeedbacksList = document.getElementById('final-feedbacks');
        const summaryText = document.getElementById('analysis-summary-text');

        // 프레임별 데이터를 타임라인 형태로 수집하기 위한 배열 리스트
        let trackingTimeline = [];
        let isRunning = false;
        let isWebcamMode = false;
        let stream = null;
        let animationFrameId = null;

        // 세 점 사이의 2D 각도 계산 함수
        function calculateAngle(a, b, c) {
            const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
            let angle = Math.abs((radians * 180.0) / Math.PI);
            if (angle > 180.0) angle = 360 - angle;
            return Math.round(angle);
        }

        // 수평 기준으로 한 세그먼트의 절대 기울기 계산 (몸통 세움/기울기 파악용)
        function calculateSegmentSlope(a, b) {
            const radians = Math.atan2(b.y - a.y, b.x - a.x);
            let angle = Math.abs((radians * 180.0) / Math.PI);
            return Math.round(angle);
        }

        // MediaPipe Pose 설정
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // 프레임별 랜드마크 추출 및 타임라인 배열에 적재
        pose.onResults((results) => {
            if (!results.poseLandmarks) return;

            if (canvasElement.width !== videoElement.videoWidth || canvasElement.height !== videoElement.videoHeight) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // 스켈레톤 드로잉
            drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, { color: '#00F0FF', lineWidth: 3 });
            drawLandmarks(canvasCtx, results.poseLandmarks, { color: '#FF3B30', lineWidth: 1, radius: 3 });

            // 분석에 필요한 랜드마크 데이터 파싱 및 안전 추출
            const rShoulder = results.poseLandmarks[12];
            const rElbow = results.poseLandmarks[14];
            const rWrist = results.poseLandmarks[16];
            const lShoulder = results.poseLandmarks[11];

            const rHip = results.poseLandmarks[24];
            const rKnee = results.poseLandmarks[26];
            const rAnkle = results.poseLandmarks[28];
            const lHip = results.poseLandmarks[23];

            // 랜드마크 존재 시 역학 지표 프레임 적재
            if (rShoulder && rElbow && rWrist && rHip && rKnee && rAnkle && lShoulder && lHip) {
                const elbowAngle = calculateAngle(rShoulder, rElbow, rWrist);
                const kneeAngle = calculateAngle(rHip, rKnee, rAnkle);
                
                // 골반축 정렬 대비 어깨축 비틀림 (X-Factor 추적을 위한 유사 대용 수치)
                const shoulderLine = { x: rShoulder.x - lShoulder.x, y: rShoulder.y - lShoulder.y };
                const hipLine = { x: rHip.x - lHip.x, y: rHip.y - lHip.y };
                const angleToRad = Math.atan2(shoulderLine.y, shoulderLine.x) - Math.atan2(hipLine.y, hipLine.x);
                const twistAngle = Math.abs(Math.round((angleToRad * 180.0) / Math.PI));

                // 척추 몸통 기울기 측정 (코-엉덩이 연결축)
                const nose = results.poseLandmarks[0];
                const midHip = { x: (rHip.x + lHip.x) / 2, y: (rHip.y + lHip.y) / 2 };
                const torsoSlope = calculateSegmentSlope(midHip, nose);

                trackingTimeline.push({
                    elbowAngle: elbowAngle,
                    kneeAngle: kneeAngle,
                    twistAngle: twistAngle > 180 ? 360 - twistAngle : twistAngle,
                    torsoSlope: torsoSlope,
                    wristY: rWrist.y  // 손목 높이 궤적 추적용
                });
            }

            canvasCtx.restore();
        });

        // 프레임 드라이버 루프
        async function processFrameLoop() {
            if (!isRunning) return;
            if (videoElement.readyState >= 2) { 
                await pose.send({ image: videoElement });
            }
            animationFrameId = requestAnimationFrame(processFrameLoop);
        }

        // 비디오 업로드 핸들러
        const fileInput = document.getElementById('upload-video');
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            stopWebcamMode();
            resetAnalysis();

            const fileURL = URL.createObjectURL(file);
            videoElement.src = fileURL;
            videoElement.srcObject = null;
            videoElement.controls = true;
            videoElement.autoplay = true;
            videoElement.load();

            statusBadge.innerText = "분석 시작됨";
            statusBadge.className = "px-2.5 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-semibold";
        });

        videoElement.addEventListener('play', () => {
            if (!isRunning) {
                isRunning = true;
                processFrameLoop();
            }
        });

        videoElement.addEventListener('pause', () => {
            isRunning = false;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
        });

        videoElement.addEventListener('ended', () => {
            isRunning = false;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            generateTimelineAnalysisReport();
        });

        // 웹캠 제어 핸들러
        btnWebcam.addEventListener('click', async () => {
            if (isWebcamMode) {
                stopWebcamMode();
                generateTimelineAnalysisReport();
                return;
            }

            try {
                resetAnalysis();
                isWebcamMode = true;
                
                statusBadge.innerText = "장치 확보 중...";
                statusBadge.className = "px-2.5 py-1 rounded-full bg-yellow-100 text-yellow-700 text-xs font-semibold";

                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
                    audio: false
                });

                videoElement.srcObject = stream;
                videoElement.controls = false;
                videoElement.autoplay = true;
                videoElement.play();

                btnWebcam.innerHTML = `<i class="fa-solid fa-circle-stop"></i> 웹캠 종료 및 분석`;
                btnWebcam.className = "bg-red-600 hover:bg-red-700 text-white font-medium px-5 py-2.5 rounded-lg transition flex items-center gap-2 shadow-sm text-sm";
                
                statusBadge.innerText = "실시간 녹화 분석 중";
                statusBadge.className = "px-2.5 py-1 rounded-full bg-rose-100 text-rose-700 text-xs font-semibold";

                isRunning = true;
                processFrameLoop();

            } catch (error) {
                console.error(error);
                alert("카메라 연결 실패. 권한을 수락해주세요.");
                isWebcamMode = false;
                statusBadge.innerText = "카메라 실패";
                statusBadge.className = "px-2.5 py-1 rounded-full bg-red-100 text-red-700 text-xs font-semibold";
            }
        });

        function stopWebcamMode() {
            isWebcamMode = false;
            isRunning = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            videoElement.srcObject = null;
            
            btnWebcam.innerHTML = `<i class="fa-solid fa-camera"></i> 웹캠 시작`;
            btnWebcam.className = "bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-5 py-2.5 rounded-lg transition flex items-center gap-2 shadow-sm text-sm";
        }

        // 🌟 타임라인 기반 역학 분석기 (핵심 로직 변경 구간!) 🌟
        function generateTimelineAnalysisReport() {
            statusBadge.innerText = "구간 분석 완료";
            statusBadge.className = "px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700 text-xs font-semibold";

            if (trackingTimeline.length < 15) {
                alert("투구 프레임 수가 너무 적어 정밀 단계를 검출할 수 없습니다. 더 긴 영상을 준비해주세요.");
                resetAnalysis();
                return;
            }

            // 1. 시퀀스 단계별 인덱스 추출 (Timeline Segmentation)
            // 투구 손목이 가장 높이 위치한 지점을 코킹/릴리스 전환 임계점(Cocking peak)으로 설정합니다.
            let minWristYVal = 1.0;
            let peakIndex = 0;
            for (let i = 0; i < trackingTimeline.length; i++) {
                if (trackingTimeline[i].wristY < minWristYVal) { // 이미지 좌표계에서 Y는 작을수록 위쪽
                    minWristYVal = trackingTimeline[i].wristY;
                    peakIndex = i;
                }
            }

            // 전체 시퀀스를 4구간으로 정확히 분할하여 분석합니다.
            const windupSlice = trackingTimeline.slice(0, Math.floor(peakIndex * 0.5));
            const cockingSlice = trackingTimeline.slice(Math.floor(peakIndex * 0.5), peakIndex);
            const releaseSlice = trackingTimeline.slice(peakIndex, Math.min(peakIndex + 8, trackingTimeline.length));
            const followSlice = trackingTimeline.slice(Math.min(peakIndex + 8, trackingTimeline.length));

            // 2. 구간별 핵심 다이내믹 피처 추출
            // [코킹구간] 팔꿈치 가동 범위
            const cockingElbows = cockingSlice.map(f => f.elbowAngle);
            const maxCockingElbow = cockingElbows.length > 0 ? Math.max(...cockingElbows) : 90;

            // [릴리스구간] 디딤무릎 지탱력
            const releaseKnees = releaseSlice.map(f => f.kneeAngle);
            const minReleaseKnee = releaseKnees.length > 0 ? Math.min(...releaseKnees) : 130;

            // [전구간 평균 대비 코킹구간] 최대 어깨-골반 비틀림 차이 (X-Factor)
            const cockingTwists = cockingSlice.map(f => f.twistAngle);
            const maxXFactor = cockingTwists.length > 0 ? Math.max(...cockingTwists) : 15;

            // [팔로스루구간] 척추 숙임 기하 각도 (기울기)
            const followSlopes = followSlice.map(f => f.torsoSlope);
            const maxTorsoTilt = followSlopes.length > 0 ? Math.max(...followSlopes) : 90;

            // 3. 점수 가감 시스템 고도화 및 입체적 피드백 구축
            let score = 100;
            let feedbacks = [];
            let summaryTextMsg = "";

            // --- 1단계 코킹구간 분석 (상체 어깨 가동성) ---
            if (maxCockingElbow >= 105 && maxCockingElbow <= 135) {
                feedbacks.push(`<strong>[Wind-up / Cocking] 코킹 팔꿈치 각도 (${maxCockingElbow}°) - 매우 우수</strong><br>어깨 견갑골 뒤쪽 회전 포켓에 안정적으로 팔이 머무르고 있어 가속을 가하기 위한 최대의 충전 공간을 마련했습니다.`);
            } else if (maxCockingElbow < 105) {
                score -= 12;
                feedbacks.push(`<strong>[Wind-up / Cocking] 코킹 팔꿈치 각도 (${maxCockingElbow}°) - 비효율적 수축</strong><br>테이크백 시 팔이 몸 뒤에 갇혀 팔꿈치가 과하게 접혔습니다. 송구 시 가속 구간이 부족해 직구 회전 효율이 떨어질 수 있습니다.`);
            } else {
                score -= 15;
                feedbacks.push(`<strong>[Wind-up / Cocking] 코킹 팔꿈치 각도 (${maxCockingElbow}°) - 오버스트레칭 위험</strong><br>팔꿈치 벌림각이 지나치게 커서 어깨 전방 회전근개에 가해지는 견인 장력이 위험 수준입니다. 주관절 내측 인대에 데미지가 누적될 우려가 있습니다.`);
            }

            // --- 2단계 릴리스구간 분석 (하체 지면 반발력 제어) ---
            if (minReleaseKnee >= 125 && minReleaseKnee <= 145) {
                feedbacks.push(`<strong>[Release] 스트라이드 디딤다리 각도 (${minReleaseKnee}°) - 지면 반발력 폭발</strong><br>디딤 무릎이 견고한 브레이크 벽 역할을 제대로 수행하고 있어, 엉덩이 회전 관성을 상체 끝으로 왜곡 없이 밀어 올리는 정석 피칭입니다.`);
            } else if (minReleaseKnee < 125) {
                score -= 15;
                feedbacks.push(`<strong>[Release] 스트라이드 디딤다리 각도 (${minReleaseKnee}°) - 에너지 누수형 굴곡</strong><br>착지 시 디딤발 무릎이 과도하게 가라앉아, 하체 회전 가속이 지면으로 유실됩니다. 앞다리 허벅지(대퇴사두근)의 전방 버팀력을 보강하십시오.`);
            } else {
                score -= 10;
                feedbacks.push(`<strong>[Release] 스트라이드 디딤다리 각도 (${minReleaseKnee}°) - 조기 무릎 잠김(Locking)</strong><br>스트라이드가 조기에 펴져 착지 충격이 척추 요추부와 무릎 관절로 직접 전달됩니다. 보폭을 현재보다 반 보 넓혀 밸런스를 유도하세요.`);
            }

            // --- 3단계 코킹구간 골반 꼬임 분석 (상하체 회전 분리 - X-Factor) ---
            if (maxXFactor >= 25) {
                feedbacks.push(`<strong>[Kinetic Chain] 상하체 분리도 X-Factor (${maxXFactor}°) - 다이내믹 꼬임</strong><br>골반이 회전을 먼저 시작하고 상체가 마지막에 뒤따라 나오는 비틀림 에너지가 매우 뛰어납니다. 강속구를 뿌리기 위한 최적의 상태입니다.`);
            } else {
                score -= 15;
                feedbacks.push(`<strong>[Kinetic Chain] 상하체 분리도 X-Factor (${maxXFactor}°) - 동시 회전(통던지기)</strong><br>골반과 어깨가 한 번에 같이 회전하고 있습니다. 몸의 회전 비틀림을 사용하지 못해 팔 힘만으로 억지로 밀어던지는 비효율 투구 패턴입니다.`);
            }

            // --- 4단계 팔로스루 몸통 숙임 분석 (피니시 제어) ---
            if (maxTorsoTilt >= 75) {
                feedbacks.push(`<strong>[Follow-through] 피니시 몸통 기울기 (${maxTorsoTilt}°) - 끝막음 완벽</strong><br>릴리스 이후 가슴을 끝까지 숙이고 팔이 반대편 옆구리를 쓸며 지나가, 투구 충격 에너지를 등 전체로 부드럽게 감속 분산시키고 있습니다.`);
            } else {
                score -= 8;
                feedbacks.push(`<strong>[Follow-through] 피니시 몸통 기울기 (${maxTorsoTilt}°) - 상체 우뚝 섬</strong><br>공을 던진 후 상체가 그대로 위로 서서 급격히 멈춥니다. 감속되지 않은 팔의 잔여 에너지가 어깨 뒤쪽 관절와순에 축적되어 만성 통증을 유발할 수 있습니다.`);
            }

            // 4. 점수에 따라 다른 요약 평가 부여
            if (score >= 88) {
                summaryTextMsg = "🔥 프로 수준의 폭발적인 회전 연쇄 반응 궤적";
            } else if (score >= 72) {
                summaryTextMsg = "⚾ 무난한 밸런스이나 구간별 동적 정렬 교정 권장";
            } else {
                summaryTextMsg = "⚠️ 부상 위험도가 높고 골반 회전이 무너진 투구 패턴";
            }

            // 5. 엘리먼트 바인딩 및 출력
            finalScoreText.innerText = `${Math.max(35, score)}점`;
            summaryText.innerText = summaryTextMsg;
            repMaxElbowText.innerText = `${maxCockingElbow}°`;
            repMinKneeText.innerText = `${minKneeAngleFromTimeline(trackingTimeline)}°`; // 보정된 전체 범위 데이터 매핑
            repHipShoulderText.innerText = `${maxXFactor}°`;
            repTorsoTiltText.innerText = `${maxTorsoTilt}°`;

            finalFeedbacksList.innerHTML = feedbacks.map(item => `
                <li class="border-b border-amber-200/40 pb-3 last:border-0 text-slate-800">
                    ${item}
                </li>
            `).join('');

            // 대기화면 숨기고 리포트 표시
            waitCard.classList.add('hidden');
            reportCard.classList.remove('hidden');

            // 리포트로 스크롤링
            reportCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 유틸리티: 전체 무릎 각도 중 유효 최소치 추출 보조기
        function minKneeAngleFromTimeline(timeline) {
            const arr = timeline.map(t => t.kneeAngle).filter(v => v > 80);
            return arr.length > 0 ? Math.min(...arr) : 120;
        }

        // 화면 리셋
        function resetAnalysis() {
            trackingTimeline = [];
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            waitCard.classList.remove('hidden');
            reportCard.classList.add('hidden');
            statusBadge.innerText = "대기 중";
            statusBadge.className = "px-2.5 py-1 rounded-full bg-slate-100 text-slate-600 text-xs font-semibold";
        }
    </script>
</body>
</html>
