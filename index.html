<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 야구 투구폼 분석기 (웹캠 및 업로드 완벽 지원)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 비율 */
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
        }
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }
        .video-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <header class="bg-blue-900 text-white shadow-md py-6">
        <div class="max-w-6xl mx-auto px-4 flex items-center justify-between">
            <h1 class="text-2xl font-bold flex items-center gap-3">
                <i class="fa-solid fa-baseball-bat-ball text-yellow-400"></i>
                AI 야구 투구폼 분석기
            </h1>
            <span class="bg-blue-800 text-xs px-3 py-1.5 rounded-full border border-blue-700">실시간 웹캠 & 자동 분석</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2 text-slate-700">
                    <i class="fa-solid fa-square-play text-blue-600"></i> 투구 모니터링 영역
                </h2>
                
                <div class="video-wrapper shadow-inner">
                    <video id="input_video" playsinline controls muted></video>
                    <canvas id="output_canvas"></canvas>
                </div>

                <div class="mt-5 flex flex-wrap items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <label class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg cursor-pointer transition flex items-center gap-2 shadow-sm text-sm">
                            <i class="fa-solid fa-cloud-arrow-up"></i> 영상 업로드
                            <input type="file" id="upload-video" accept="video/*" class="hidden">
                        </label>
                        
                        <button id="btn-webcam" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-5 py-2.5 rounded-lg transition flex items-center gap-2 shadow-sm text-sm">
                            <i class="fa-solid fa-camera"></i> 웹캠 시작
                        </button>
                    </div>

                    <div class="text-sm font-medium text-slate-500">
                        상태: <span id="status-badge" class="px-2.5 py-1 rounded-full bg-slate-100 text-slate-600 text-xs font-semibold">대기 중</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="md:col-span-1">
            <div id="wait-card" class="bg-white p-8 rounded-xl shadow-sm border border-slate-100 text-center space-y-4 h-full flex flex-col justify-center items-center">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-2xl animate-pulse">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <div>
                    <h3 class="text-base font-semibold text-slate-700">종합 진단 대기 중</h3>
                    <p class="text-xs text-slate-400 mt-2 leading-relaxed">
                        영상이 로드되어 재생이 모두 끝나거나 웹캠을 정지하면, AI 정밀 운동 역학 분석 보고서가 이곳에 실시간으로 표시됩니다.
                    </p>
                </div>
            </div>

            <div id="report-card" class="hidden bg-white p-6 rounded-xl shadow-lg border-t-4 border-blue-600 space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                        <i class="fa-solid fa-square-poll-horizontal text-blue-600"></i> 투구 종합 리포트
                    </h3>
                    <button onclick="resetAnalysis()" class="text-xs text-slate-400 hover:text-red-500 transition">초기화</button>
                </div>

                <div class="bg-gradient-to-br from-blue-500 to-blue-600 p-6 rounded-xl text-center space-y-1 text-white shadow-sm">
                    <span class="text-xs font-bold text-blue-100 tracking-wider">Total Pitching Balance Score</span>
                    <div class="text-5xl font-black" id="final-score">0점</div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-50 p-3 rounded-lg border border-slate-100 text-center">
                        <div class="text-[10px] text-slate-400 font-medium">최대 팔꿈치 각도</div>
                        <div class="text-base font-bold text-slate-800 mt-1" id="rep-max-elbow">0°</div>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-lg border border-slate-100 text-center">
                        <div class="text-[10px] text-slate-400 font-medium">최소 디딤무릎 각도</div>
                        <div class="text-base font-bold text-slate-800 mt-1" id="rep-min-knee">0°</div>
                    </div>
                </div>

                <div class="bg-amber-50/70 p-5 rounded-lg border border-amber-100 space-y-3">
                    <h4 class="text-xs font-bold text-amber-800 flex items-center gap-1.5 uppercase tracking-wide">
                        <i class="fa-solid fa-dna text-amber-600"></i> 운동역학 정밀 교정 처방전
                    </h4>
                    <ul class="text-xs text-amber-900 leading-relaxed list-decimal list-inside space-y-3" id="final-feedbacks">
                        </ul>
                </div>
            </div>
        </div>

    </main>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        const statusBadge = document.getElementById('status-badge');
        const waitCard = document.getElementById('wait-card');
        const reportCard = document.getElementById('report-card');
        const btnWebcam = document.getElementById('btn-webcam');

        const finalScoreText = document.getElementById('final-score');
        const repMaxElbowText = document.getElementById('rep-max-elbow');
        const repMinKneeText = document.getElementById('rep-min-knee');
        const finalFeedbacksList = document.getElementById('final-feedbacks');

        let elbowAngles = [];
        let kneeAngles = [];
        let isRunning = false;
        let isWebcamMode = false;
        let stream = null;
        let animationFrameId = null;

        // 세 점 사이의 사이각 계산 함수
        function calculateAngle(a, b, c) {
            const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
            let angle = Math.abs((radians * 180.0) / Math.PI);
            if (angle > 180.0) angle = 360 - angle;
            return Math.round(angle);
        }

        // MediaPipe Pose 객체 설정 및 초기화
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // 프레임 분석 결과 수집 및 캔버스 스케치
        pose.onResults((results) => {
            if (!results.poseLandmarks) return;

            // 영상 해상도와 캔버스 크기 강제 매칭 보정
            if (canvasElement.width !== videoElement.videoWidth || canvasElement.height !== videoElement.videoHeight) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // 포즈 감지 선 및 포인트 시각화
            drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, { color: '#00FF00', lineWidth: 4 });
            drawLandmarks(canvasCtx, results.poseLandmarks, { color: '#FF0000', lineWidth: 1, radius: 4 });

            // 주요 조인트 포인트(우측 어깨-팔꿈치-손목 및 골반-무릎-발목) 매핑 추출
            const shoulder = results.poseLandmarks[12];
            const elbow = results.poseLandmarks[14];
            const wrist = results.poseLandmarks[16];
            const hip = results.poseLandmarks[24];
            const knee = results.poseLandmarks[26];
            const ankle = results.poseLandmarks[28];

            if (shoulder && elbow && wrist) {
                elbowAngles.push(calculateAngle(shoulder, elbow, wrist));
            }
            if (hip && knee && ankle) {
                kneeAngles.push(calculateAngle(hip, knee, ankle));
            }

            canvasCtx.restore();
        });

        // 비디오 프레임을 MediaPipe에 전송하는 통합 루프 함수
        async function processFrameLoop() {
            if (!isRunning) return;
            
            // 비디오 프레임 유효성 검사 후 전송
            if (videoElement.readyState >= 2) { 
                await pose.send({ image: videoElement });
            }
            animationFrameId = requestAnimationFrame(processFrameLoop);
        }

        // 1. 영상 파일 업로드 이벤트 핸들러
        const fileInput = document.getElementById('upload-video');
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 이전 분석 및 웹캠 동작 초기화
            stopWebcamMode();
            resetAnalysis();

            const fileURL = URL.createObjectURL(file);
            videoElement.src = fileURL;
            videoElement.srcObject = null;
            videoElement.controls = true;
            
            // 파일 업로드 즉시 재생 활성화
            videoElement.autoplay = true;
            videoElement.load();

            statusBadge.innerText = "영상이 로드되어 분석 시작됨";
            statusBadge.className = "px-2.5 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-semibold";
        });

        // 재생이 감지되는 순간 루프 실행
        videoElement.addEventListener('play', () => {
            if (!isRunning) {
                isRunning = true;
                processFrameLoop();
            }
        });

        // 비디오 정지 및 일시정지 시 분석 루프 중단 제어
        videoElement.addEventListener('pause', () => {
            isRunning = false;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
        });

        // 2. 비디오 재생 완료 이벤트 -> 자동으로 정밀 결과 피드백 표출
        videoElement.addEventListener('ended', () => {
            isRunning = false;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            generateAnalysisReport();
        });

        // 3. 웹캠 실시간 캡쳐 및 허용 제어 로직
        btnWebcam.addEventListener('click', async () => {
            // 웹캠 모드 실행 중 클릭했다면 중지 및 종합 피드백 표출
            if (isWebcamMode) {
                stopWebcamMode();
                generateAnalysisReport();
                return;
            }

            try {
                resetAnalysis();
                isWebcamMode = true;
                
                statusBadge.innerText = "카메라 장치 연동 중...";
                statusBadge.className = "px-2.5 py-1 rounded-full bg-yellow-100 text-yellow-700 text-xs font-semibold";

                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
                    audio: false
                });

                videoElement.srcObject = stream;
                videoElement.controls = false;
                videoElement.autoplay = true;
                videoElement.play();

                // UI 토글 변경
                btnWebcam.innerHTML = `<i class="fa-solid fa-circle-stop"></i> 웹캠 종료 및 분석`;
                btnWebcam.className = "bg-red-600 hover:bg-red-700 text-white font-medium px-5 py-2.5 rounded-lg transition flex items-center gap-2 shadow-sm text-sm";
                
                statusBadge.innerText = "웹캠 실시간 분석 가동 중";
                statusBadge.className = "px-2.5 py-1 rounded-full bg-rose-100 text-rose-700 text-xs font-semibold";

                // 루프 구동 시작
                isRunning = true;
                processFrameLoop();

            } catch (error) {
                console.error("웹캠 권한 확보 오류: ", error);
                alert("웹캠 카메라 연결에 실패했습니다. 권한 허용 상태를 점검해주세요.");
                isWebcamMode = false;
                statusBadge.innerText = "연결 실패";
                statusBadge.className = "px-2.5 py-1 rounded-full bg-red-100 text-red-700 text-xs font-semibold";
            }
        });

        // 웹캠 해제 정지 처리
        function stopWebcamMode() {
            isWebcamMode = false;
            isRunning = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            videoElement.srcObject = null;
            
            // 버튼 상태 원상복구
            btnWebcam.innerHTML = `<i class="fa-solid fa-camera"></i> 웹캠 시작`;
            btnWebcam.className = "bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-5 py-2.5 rounded-lg transition flex items-center gap-2 shadow-sm text-sm";
        }

        // 4. 초정밀 디테일 역학 분석 보고서 빌더
        function generateAnalysisReport() {
            statusBadge.innerText = "분석 완료";
            statusBadge.className = "px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700 text-xs font-semibold";

            if (elbowAngles.length === 0 || kneeAngles.length === 0) {
                alert("관절 데이터가 기록되지 않았습니다. 투수 전신 및 릴리스 동작이 뚜렷하게 보이도록 프레임을 유지해주세요.");
                resetAnalysis();
                return;
            }

            // 분석 핵심 지표 계산
            const maxElbow = Math.max(...elbowAngles);
            const minKnee = Math.min(...kneeAngles);
            
            const avgElbow = Math.round(elbowAngles.reduce((a, b) => a + b, 0) / elbowAngles.length);
            const avgKnee = Math.round(kneeAngles.reduce((a, b) => a + b, 0) / kneeAngles.length);

            let score = 100;
            let feedbacks = [];

            // 디테일 분석 1: 오버헤드 릴리스 팔각도 역학 분석
            if (maxElbow >= 110 && maxElbow <= 130) {
                feedbacks.push(`<strong>[상체] 릴리스 포인트 팔 각도 (${maxElbow}°) - 최적</strong><br>투구 동작 중 어깨 관절 회전 에너지를 온전히 손목 끝으로 뿜어내는 정석 범주에 속합니다. 부상 위험도가 적고 구속 향상에 최적화된 상태입니다.`);
            } else if (maxElbow < 110) {
                score -= 15;
                feedbacks.push(`<strong>[상체] 릴리스 포인트 팔 각도 (${maxElbow}°) - 회전 반경 협소</strong><br>팔꿈치가 지나치게 접힌 상태에서 투구하여 상체 회전 가속도 대신 손목 힘만으로 밀어던지는 경향이 있습니다. 가슴축 회전 가동 범위를 높이십시오.`);
            } else {
                score -= 12;
                feedbacks.push(`<strong>[상체] 릴리스 포인트 팔 각도 (${maxElbow}°) - 팔꿈치 처짐 리스크</strong><br>투구 과정에서 어깨 회전축보다 팔꿈치가 아래로 처져 가속 구간이 과도하게 길어졌습니다. 이는 내측부인대 파열의 원인이 되므로 주의가 필요합니다.`);
            }

            // 디테일 분석 2: 디딤무릎 지면 반발력 제어 능력 분석
            if (minKnee >= 125 && minKnee <= 140) {
                feedbacks.push(`<strong>[하체] 디딤무릎 각도 (${minKnee}°) - 완벽한 제동</strong><br>골반이 닫힌 각을 완벽하게 확보하고 상체가 넘어올 수 있도록 튼튼한 축을 만들어 지면 반발 에너지를 체중 이동으로 전환해 내고 있습니다.`);
            } else if (minKnee < 125) {
                score -= 15;
                feedbacks.push(`<strong>[하체] 디딤무릎 각도 (${minKnee}°) - 중심축 붕괴</strong><br>체중 이동 시 무릎이 과하게 구부러지면서 에너지가 아래로 새어 나가고 있습니다. 디딤발 무릎의 지탱력을 보완하기 위한 대퇴사두근 강성이 필요합니다.`);
            } else {
                score -= 10;
                feedbacks.push(`<strong>[하체] 디딤무릎 각도 (${minKnee}°) - 골반 과속 개방</strong><br>디딤 다리가 조기에 곧게 퍼져 골반이 투구 방향으로 지나치게 빨리 열려버립니다. 보폭(스트라이드) 길이를 조금 넓혀 밸런스를 안정화하는 훈련을 추천합니다.`);
            }

            // 디테일 분석 3: 총체적 종합 코멘트 및 맞춤형 트레이닝 방향성
            if (score >= 85) {
                feedbacks.push(`<strong>[종합 처방] 최상의 키네틱 체인 링크</strong><br>상하체 타이밍과 유기적 연결성이 뛰어납니다. 릴리스 직후 가슴을 앞으로 던지며 앞다리에 올라타는 끝막음 동작만 더욱 강조해주시면 완벽합니다.`);
            } else if (score >= 70) {
                feedbacks.push(`<strong>[종합 처방] 조화 조율 필요 단계</strong><br>개별 동작의 역학적 구도는 우수하나, 몸통 중심 이동의 회전 동선에 미세한 병목이 포착됩니다. 피칭을 나설 때 스트라이드 착지 시 무릎을 견고히 잠그는 코어 안정성 훈련을 적극 제안합니다.`);
            } else {
                feedbacks.push(`<strong>[종합 처방] 고위험 부상 패턴 위험</strong><br>팔꿈치 리스크와 하체 제동력 상실이 동반되어 제구력 난조와 회전근개 부상 위험도가 높은 상태입니다. 섀도우 피칭을 통해 상체의 릴리스 타점을 높이고 고정하는 정렬 훈련부터 복기해 보세요.`);
            }

            // 점수 바인딩 출력 (최저 40점 방어)
            finalScoreText.innerText = `${Math.max(40, score)}점`;
            repMaxElbowText.innerText = `${maxElbow}° (평균 ${avgElbow}°)`;
            repMinKneeText.innerText = `${minKnee}° (평균 ${avgKnee}°)`;

            finalFeedbacksList.innerHTML = feedbacks.map(item => `
                <li class="border-b border-amber-200/50 pb-2.5 last:border-0 text-slate-800">
                    ${item}
                </li>
            `).join('');

            // 대기화면 숨기고 리포트 표시
            waitCard.classList.add('hidden');
            reportCard.classList.remove('hidden');

            // 화면을 리포트 위치로 부드럽게 스크롤링
            reportCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 분석 화면 초기화 함수
        function resetAnalysis() {
            elbowAngles = [];
            kneeAngles = [];
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            waitCard.classList.remove('hidden');
            reportCard.classList.add('hidden');
            statusBadge.innerText = "대기 중";
            statusBadge.className = "px-2.5 py-1 rounded-full bg-slate-100 text-slate-600 text-xs font-semibold";
        }
    </script>
</body>
</html>
